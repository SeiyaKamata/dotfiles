# 開発パイプラインの「フロー正本」(single source of truth)。
#
# なぜ在るか: これまで「どの工程の次に何が来るか」「各工程の done(完了条件)」「どこへ戻すか」が
#   - orchestrator/SKILL.md のフロー図
#   - 各スキルの「## 完了条件」節
#   - claude/CLAUDE.md の用語集
# の3箇所に分散し、片方だけ直すと食い違う(ドリフトする)状態だった。ここを唯一の正本にし、
# orchestrator と各スキルは「再掲せず参照」する。直す場所を1つに畳んでドリフトを消すのが目的。
#
# 用語: ここでの「工程(stage)」は claude/CLAUDE.md 用語集に一致する(= 各スキル)。
#   phases      … 背骨(直列に流れる本流の工程)
#   remediations… 背骨に並ばず、条件付きで枝として生え、済んだら本流へ戻る是正工程
#
# 各 phase のキー:
#   type        … 工程の機械名(スキル名と一致)
#   label       … 画面/ログ表示用の日本語名
#   skill       … 実行するスラッシュコマンド
#   done        … 何をもって完了とみなすか。**これが done 文言の正本**。各スキルの「## 完了条件」は
#                 この done を参照し、本文を再掲しない(二重管理・ドリフト防止)
#   next        … 前進の辺(次に来る工程の type)。分岐する場合は複数
#   on_ng       … 差し戻し時に戻れる工程の候補。どれを選ぶかは orchestrator が理由で判断する
#   human_gate  … true ならここは人間の承認を待つ関所(auto でもスキップしない)
#   scope       … feature(フィーチャー全体で通す) / phase(フェーズ=1PR ごとに回す)。
#                 test/review/commit は phase、qa は feature-once(全フェーズ後に1回だけ)
#   once        … true なら scope:feature の中でも「全フェーズ完了後に1回だけ」回す(qa 用)
#   condition   … その工程に入る条件(分岐工程のみ。判定は orchestrator)
#   auto        … true なら auto 引数で人間承認を待たず自己レビューゲートで進める
#   produces    … その工程が生む主な成果物(.specs/<feature>/ 配下 など)
#
# 番人が進めない結末(failed=再実行で直る / needs_human=人間の1手が要る)は、この地図には
# 載せない(どの工程からも抜けうる直交事項)。orchestrator の「例外処理」が扱う。

# 唯一の人間承認ゲート。ここだけ auto でも承認を待つ。
human_gates: [requirements]

# フェーズループ(大タスク=フェーズ=1PR ごとに回す工程群)。qa より前、tasks より後。
phase_loop: [impl, test, review, commit]

phases:
  - type: requirements
    label: 要件定義
    skill: /spec
    scope: feature
    human_gate: true          # 唯一の承認ゲート。auto を渡さず人間承認を取る
    auto: false
    done: "全要件が EARS 形式・テスト可能・スコープ境界明示・HOW 不混入で、ユーザーが承認し .specs/<feature>/requirements.md に保存できた"
    next: [design]
    produces: [requirements.md]

  - type: design
    label: 設計
    skill: /design
    scope: feature
    auto: true
    done: "拡張性・保守性・既存踏襲・SOLID を加味した設計ができ、ユーザーが承認し .specs/<feature>/design.md に保存できた"
    next: [prototype, tasks]   # prototype は condition を満たすときだけ。満たさなければ tasks 直行
    produces: [design.md]

  - type: prototype
    label: プロトタイピング
    skill: /prototype
    scope: feature
    auto: true
    condition: "大きい修正(新規画面複数/複数フェーズ規模/操作フロー新規) かつ UI を含む"
    done: "design.md への書き戻し・<feature>-proto への1コミット・@coderabbitai ignore 入りの検証用 draft PR 作成が完了した"
    next: [tasks]
    produces: [design.md, "<feature>-proto ブランチ"]

  - type: tasks
    label: タスク分解(PR分割)
    skill: /tasks
    scope: feature
    auto: true
    done: "Outside-in でレビュー可能なフェーズ(大タスク=1PR)に分割され、ユーザーが承認し tasks.md と qa.md の両方を保存できた"
    next: [impl]               # フェーズループの入口
    produces: [tasks.md, qa.md]

  - type: impl
    label: 単一フェーズ実装
    skill: /impl
    scope: phase               # 大タスク(フェーズ)ごとに回す
    auto: true
    done: "対象フェーズの全サブタスクが [x] になり、テスト・ビルドがパスした"
    next: [test]

  - type: test
    label: テスト実行
    skill: /test
    scope: phase
    auto: true
    done: "テストを実行し PASS/FAIL を判定した(PASS→review / FAIL→fix)"
    next: [review]
    on_ng: [fix]              # FAIL は fix へ(是正)。test FAIL 3連続で停止は orchestrator が持つ

  - type: review
    label: コードレビュー
    skill: /review
    scope: phase
    auto: true
    # 注: 旧 review/SKILL.md は「OK なら /qa」と書いていたが、それは単体起動時の話。
    #     フェーズループ本流では review OK → commit(qa は全フェーズ後に once)。next はここが正本。
    done: "仕様・設計との整合とコード品質をレビューし、結果を報告した"
    next: [commit]
    on_ng: [design, impl]    # 設計の根本問題は design、それ以外は impl へ戻す(判断は orchestrator)

  - type: commit
    label: コミット
    skill: /commit
    scope: phase
    auto: true
    done: "commit-planner の分割計画を承認し、このフェーズのブランチにコミットした(stacked では PR はまだ作らない)"
    next: [qa]               # 全フェーズ完了後に qa へ。未完なら次フェーズの impl へ戻る(orchestrator が判断)

  - type: qa
    label: 受け入れQA
    skill: /qa
    scope: feature
    once: true              # フェーズごとでなく、全フェーズ実装後に1回だけ回す最終受け入れゲート
    auto: true
    done: "qa.md の全シナリオが pass([x]) になり、コミット工程へ渡せる状態になった"
    next: [create_pr]
    on_ng: [fix, design, impl]  # 原因フェーズを特定し fix(設計起因なら design/impl)→再合流

  - type: create_pr
    label: PR作成(draft)
    skill: /create-pr
    scope: feature
    auto: true
    done: "draft PR(stacked なら全フェーズ分)を作成し URL を報告した"
    next: [watch_ci]

  - type: watch_ci
    label: CI監視
    skill: /watch-ci
    scope: feature
    auto: true
    done: "CI が green(auto では Ready for review に切り替えず draft のまま)。未解決コメントがあれば respond_pr_comments へ"
    next: [respond_pr_comments]

  - type: respond_pr_comments
    label: レビュー指摘対応(CodeRabbit)
    skill: /respond-pr-comments
    scope: feature
    auto: true
    done: "未解決の CodeRabbit コメントすべてに対応・返信し、「対応しない」項目を tasks.md に記録した"
    next: []                # 終端。draft PR + CI green + コメント解決済みで人に報告して停止

# 是正工程: 本流に並ばず条件付きで枝として生え、済んだら returns_to の工程へ戻る。
remediations:
  - type: fix
    label: 失敗修正
    skill: /fix
    done: "テスト失敗/レビュー NG/QA 失敗の原因を特定し、最小限の修正を行った(設計起因と判断したら design へ回す)"
    returns_to: [test]      # 直近の呼び出し元へ戻る(test 由来なら test、review/qa 由来はその工程)

  - type: change
    label: 仕様・設計・タスクの変更
    skill: /change
    done: "実装中に判明した変更の影響範囲を判断し、適切な工程に戻してドキュメントを更新した"
    returns_to: [requirements, design, tasks]  # 影響範囲に応じて change が戻し先を判断
