[general]
import = [
    "~/.config/alacritty/themes.toml"
]

[window]
padding = { x = 4, y = 0 }
opacity = 0.75
blur = true
startup_mode = "Fullscreen"

[scrolling]
history = 100000
multiplier = 5

[font]
size = 18.0
offset = { x = 0, y = 0 }

[font.normal]
family = "Hack Nerd Font"
style = "Regular"

[font.bold]
family = "Hack Nerd Font"
style = "Bold"

[font.italic]
family = "Hack Nerd Font"
style = "Italic"

[font.bold_italic]
family = "Hack Nerd Font"
style = "Bold Italic"

[terminal]
shell = { program = "/bin/zsh", args = ["-l", "-c", "tmux new -A -s default"] }
