
[general]
import = [
    "~/.config/alacritty/themes.toml"
]

[window]
padding = { x = 12, y = 8 }
blur = true
startup_mode = "Maximized"
decorations = "None"

[scrolling]
history = 100000
multiplier = 5

[keyboard]
bindings = [
    { key = "Enter", mods = "Command", action = "ToggleMaximized" },
    { key = "\u00a5", chars = "\\" },
    { key = "1", mods = "Control", chars = "\u00001" },
    { key = "2", mods = "Control", chars = "\u00002" },
    { key = "3", mods = "Control", chars = "\u00003" },
    { key = "4", mods = "Control", chars = "\u00004" },
    { key = "5", mods = "Control", chars = "\u00005" },
    { key = "6", mods = "Control", chars = "\u00006" },
    { key = "7", mods = "Control", chars = "\u00007" },
]

[font]
size = 18.0
builtin_box_drawing = true

[font.normal]
family = "HackGen Console NF"
style = "Regular"

[font.bold]
family = "HackGen Console NF"
style = "Bold"

[font.italic]
family = "HackGen Console NF"
style = "Italic"

[font.bold_italic]
family = "HackGen Console NF"
style = "Bold Italic"

[terminal]
shell = { program = "/bin/zsh", args = ["-l", "-c", "/Users/kamata_seiya/.nix-profile/bin/herdr"] }

