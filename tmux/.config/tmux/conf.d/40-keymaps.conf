# NOTE: tmux popup は passthrough 非対応のため yazi の TRT が発生する (tmux#4329, yazi#2308)。
# 入れ子の tmux セッションを popup 内で立て、その中で yazi を起動することで回避する。
bind-key y display-popup \
  -d "#{pane_current_path}" \
  -w 80% \
  -h 80% \
  -E "tmux new-session yazi \\; set status off"

bind-key s split-window -v
bind-key x kill-pane
bind-key n new-window
bind-key d confirm-before -p "kill-window? (y/n)" kill-window


bind-key -n C-t select-pane -t :.+
bind-key -n C-Left resize-pane -L 5
bind-key -n C-Right resize-pane -R 5
bind-key -n C-Up resize-pane -U 5
bind-key -n C-Down resize-pane -D 5

unbind f
