# ===== common =====
set -g status-interval 5
set -g status-justify centre
set -gF status-style "bg=#{@mid_bg},fg=#{@fg}"

# ===== status-left =====
set-option -g status-left-length 100
set -g status-left "\
#[bg=#{E:@mode_bg},fg=#{E:@mode_fg}]#{E:@mode_text}\
#[bg=#{@accent},fg=#{E:@mode_bg}]#{@sep}\
#[bg=#{@accent},fg=#{@bg}] #S \
#[bg=#{@mid_bg},fg=#{@accent}]#{@sep}\
#[bg=#{@mid_bg},fg=#{@fg}] #{b:pane_current_path} \
#[bg=#{@mid_bg},fg=#{@accent}]#{?#{!=:#{pane_current_path},},#{=/23/…:#(git -C #{pane_current_path} branch --show-current 2>/dev/null | xargs -I BRANCH echo ⎇ BRANCH)},} \
"


# ===== status-right =====
set -g status-right-length 100
set -g status-right "\
#[bg=#{@mid_bg},fg=#{@win_bg}]#{@right_sep}\
#[bg=#{@win_bg},fg=#{@fg}] %H:%M \
"


# ===== window status =====
setw -g window-status-format "\
#[bg=#{@win_bg},fg=#{@mid_bg}]#{@sep}\
#[bg=#{@win_bg},fg=#{@bg}] #I:#W \
#[bg=#{@mid_bg},fg=#{@win_bg}]#{@sep}\
"


# ===== current window status =====
setw -g window-status-current-format "\
#[bg=#{@win_active_bg},fg=#{@mid_bg}]#{@sep}\
#[bg=#{@win_active_bg},fg=#{@bg},bold] #I:#W \
#[bg=#{@mid_bg},fg=#{@win_active_bg}]#{@sep}\
"


